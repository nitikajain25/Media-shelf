<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Shelf</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body {
            /* Your Custom Blue Checkerboard Background */
            background-image: url('/static/bg-check.jpg');
            background-size: 350px; /* Adjust this to make the squares bigger/smaller */
            background-attachment: fixed;
            background-color: #e6eef5;
            color: #fff;
            min-height: 100vh;
            padding: 40px 20px;
        }

        /* Dark Glassmorphism Container to make the Logo Pop! */
        .container { 
            max-width: 1000px; 
            margin: 0 auto; 
            background: rgba(15, 23, 42, 0.85); /* Dark navy/slate */
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 40px;
            border-radius: 40px; /* Super rounded Pinterest corners */
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .header-section { text-align: center; margin-bottom: 40px; }
        
        .logo-img {
            max-width: 240px; 
            height: auto;
            margin-bottom: 10px;
            filter: drop-shadow(0px 4px 10px rgba(0,0,0,0.5));
        }
        
        .subtitle-pill {
            display: inline-block;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 25px;
            border-radius: 50px; /* Pill shape */
            font-size: 14px;
            font-weight: 500;
            margin: 5px 0 30px 0;
            color: #b0c4de; /* Soft pastel blue text */
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .stats-container { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }

        .stat-box {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px 35px;
            border-radius: 25px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            min-width: 150px;
        }

        .stat-box h3 { color: #fff; font-size: 32px; font-weight: 700; line-height: 1; margin-bottom: 5px;}
        .stat-box p { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #8ba3c0; }

        .progress-bar-bg {
            width: 280px; height: 10px; background: rgba(255, 255, 255, 0.1);
            border-radius: 20px; margin: 0 auto; overflow: hidden;
        }
        
        .progress-bar-fill {
            height: 100%; background: #a2c4f2; /* Pastel blue to match background */
            width: 0%; transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 20px;
        }

        /* Aesthetic Bubbly Form */
        form {
            background: rgba(162, 196, 242, 0.18); padding: 10px; border-radius: 50px; display: flex;
            gap: 15px; border: 1px solid rgba(162, 196, 242, 0.35); margin-bottom: 40px;
        }

        input { 
            flex: 1; border: none; padding: 15px 25px; font-size: 15px; outline: none; 
            background: transparent; color: #fff; font-weight: 500;
        }
        input::placeholder { color: rgba(255, 255, 255, 0.5); }
        
        select { 
            padding: 15px 20px; border: none; font-size: 15px; background: transparent; 
            color: #fff; outline: none; font-weight: 600; cursor: pointer;
            border-left: 2px solid rgba(255, 255, 255, 0.1);
        }
        select option { background: #0f172a; color: white; }
        
        .submit-btn {
            background: #a2c4f2; color: #0f172a; border: none; padding: 0 35px;
            border-radius: 50px; font-weight: 700; font-size: 15px; cursor: pointer; 
            transition: 0.3s ease;
        }
        .submit-btn:hover { background: #fff; transform: scale(1.02); }

        /* Dashboard Layout */
        .dashboard { display: flex; gap: 30px; }
        .column { flex: 1; background: rgba(0, 0, 0, 0.2); padding: 25px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.05); }
        
        .column-header {
            color: #fff; font-size: 18px; font-weight: 700;
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 25px;
        }
        
        .badge { background: #a2c4f2; color: #0f172a; padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: 700; }

        /* Bright Pin-style Cards to pop against the dark glass */
        .item-card {
            background: rgba(255, 255, 255, 0.95); padding: 12px; border-radius: 20px;
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
        }
        .item-card:hover { transform: translateY(-3px) scale(1.01); box-shadow: 0 10px 25px rgba(0,0,0,0.3); }

        .poster-thumbnail {
            width: 50px;
            height: 70px;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .item-info { display: flex; align-items: center; gap: 15px; font-weight: 600; font-size: 15px; color: #3a5278; }
        
        .actions { display: flex; gap: 8px; }
        
        .done-btn { background: #e2e8f0; color: #475569; border: none; padding: 10px 18px; border-radius: 50px; font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 13px;}
        .done-btn:hover { background: #a2c4f2; color: #0f172a; } 
        
        .delete-btn { background: #fff; color: #cbd5e1; border: 1px solid #e2e8f0; padding: 10px 14px; border-radius: 50px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .delete-btn:hover { background: #fca5a5; color: #fff; border-color: #fca5a5; }

        .completed-col .item-info { color: #94a3b8; }
        .completed-col .poster-thumbnail { filter: grayscale(50%) opacity(0.8); }

       /* =========================================
           RESPONSIVE DESIGN (Phones & Small Laptops) 
           ========================================= */
        @media(max-width: 768px) {
            /* 1. Reduce outer margins to save screen space */
            body { padding: 15px 10px; }
            
            /* 2. Shrink the main glass container slightly */
            .container { padding: 20px 15px; border-radius: 30px; }
            .logo-img { max-width: 180px; }
            .subtitle-pill { font-size: 12px; padding: 6px 20px; }
            
            /* 3. Stack the Stats neatly */
            .stats-container { flex-direction: column; gap: 10px; }
            .stat-box { padding: 15px; min-width: 100%; }
            .progress-bar-bg { width: 100%; }

            /* 4. Fix the Form so it doesn't squish */
            form { flex-direction: column; border-radius: 25px; padding: 15px; gap: 10px; }
            input { text-align: center; border-bottom: 1px solid rgba(255, 255, 255, 0.1); border-radius: 15px;}
            select { border-left: none; text-align: center; border-radius: 15px; padding: 12px;}
            .submit-btn { padding: 15px; width: 100%; border-radius: 15px; }

            /* 5. Stack the Up Next and Completed columns */
            .dashboard { flex-direction: column; gap: 20px; }
            .column { padding: 15px; border-radius: 20px; }

            /* 6. Make the Cards mobile-friendly (Bigger poster, stretched buttons) */
            .item-card { 
                flex-direction: column; 
                text-align: center; 
                gap: 15px; 
                padding: 15px; 
            }
            .item-info { flex-direction: column; gap: 10px; }
            .poster-thumbnail { width: 80px; height: 115px; } /* Make poster larger on phone! */
            .actions { width: 100%; justify-content: center; gap: 10px; }
            .done-btn, .delete-btn { flex: 1; padding: 12px; } /* Buttons stretch to fill width */
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-section">
            <img src="/static/logo.png" alt="Media Shelf Logo" class="logo-img">
            <br>
            <div class="subtitle-pill">✨ curating my digital library ✨</div>
            
            <div class="stats-container">
                <div class="stat-box">
                    <h3 id="total-count">0</h3>
                    <p>Total</p>
                </div>
                <div class="stat-box">
                    <h3 id="percent-count">0%</h3>
                    <p>Finished</p>
                </div>
            </div>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progress-bar"></div>
            </div>
        </div>

        <form id="media-form">
            <input type="text" id="item-title" placeholder="Add something new..." required>
            <select id="item-type">
                <option value="Movie">🎬 Movie</option>
                <option value="Book">📚 Book</option>
            </select>
            <button type="submit" class="submit-btn">Add to Shelf</button>
        </form>

        <div class="dashboard">
            <div class="column">
                <div class="column-header">
                    <span>Up Next</span>
                    <span class="badge" id="pending-badge">0</span>
                </div>
                <div id="pending-list"></div>
            </div>

            <div class="column completed-col">
                <div class="column-header">
                    <span>Completed</span>
                    <span class="badge" id="completed-badge">0</span>
                </div>
                <div id="completed-list"></div>
            </div>
        </div>
    </div>

    <script>
        const mediaForm = document.getElementById('media-form');

        async function loadShelf() {
            const response = await fetch('/api/items');
            const items = await response.json();
            
            const pendingDiv = document.getElementById('pending-list');
            const completedDiv = document.getElementById('completed-list');
            
            pendingDiv.innerHTML = '';
            completedDiv.innerHTML = '';
            
            let pendingCount = 0;
            let completedCount = 0;

           items.forEach(item => {
                // We define the icon based on the type
                const icon = item.media_type === 'Book' ? '📚' : '🎬';
                const card = document.createElement('div');
                card.className = 'item-card';

                let imageHTML = '';
                if (item.poster_url) {
                    imageHTML = `<img src="${item.poster_url}" class="poster-thumbnail" alt="Poster">`;
                }

                if (item.status === 'pending') {
                    pendingCount++;
                    card.innerHTML = `
                        <div class="item-info">
                            ${imageHTML}
                            <span>${item.title} <span style="opacity: 0.8; margin-left: 6px;">${icon}</span></span>
                        </div>
                        <div class="actions">
                            <button class="done-btn" onclick="markAsComplete(${item.id})">Done</button>
                            <button class="delete-btn" onclick="deleteItem(${item.id})">✕</button>
                        </div>
                    `;
                    pendingDiv.appendChild(card);
                } else {
                    completedCount++;
                    card.innerHTML = `
                        <div class="item-info">
                            ${imageHTML}
                            <span>${item.title} <span style="opacity: 0.8; margin-left: 6px;">${icon}</span></span>
                        </div>
                        <div class="actions">
                            <button class="delete-btn" onclick="deleteItem(${item.id})">✕</button>
                        </div>
                    `;
                    completedDiv.appendChild(card);
                }
            });

            const totalItems = pendingCount + completedCount;
            let completionPercentage = 0;
            if (totalItems > 0) {
                completionPercentage = Math.round((completedCount / totalItems) * 100);
            }

            document.getElementById('total-count').innerText = totalItems;
            document.getElementById('percent-count').innerText = `${completionPercentage}%`;
            document.getElementById('progress-bar').style.width = `${completionPercentage}%`;
            
            document.getElementById('pending-badge').innerText = pendingCount;
            document.getElementById('completed-badge').innerText = completedCount;
        }

        mediaForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = document.getElementById('item-title').value;
            const media_type = document.getElementById('item-type').value;

            await fetch('/api/items', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, media_type })
            });

            document.getElementById('item-title').value = '';
            loadShelf();
        });

        async function markAsComplete(id) {
            await fetch(`/api/items/${id}`, { method: 'PUT' });
            loadShelf();
        }

        async function deleteItem(id) {
            if(confirm("Remove this from your board?")) {
                await fetch(`/api/items/${id}`, { method: 'DELETE' });
                loadShelf();
            }
        }

        loadShelf();
    </script>
</body>
</html>
